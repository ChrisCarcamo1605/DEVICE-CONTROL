services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./docker/init-preamble.sql:/docker-entrypoint-initdb.d/00-preamble.sql
      - ./docker/init-schema.sh:/docker-entrypoint-initdb.d/01-schema.sh
      - ./init.sql:/init.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    env_file: .env.docker
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npm run migrate && node src/server.js"

volumes:
  pgdata:
